<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点歌插件设置</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="ambient ambient-left"></div>
        <div class="ambient ambient-right"></div>

        <header class="hero-panel">
            <div class="hero-copy">
                <div class="eyebrow">AListen 扩展设置</div>
                <h1 class="title">点歌配置面板</h1>
                <p class="subtitle">设置服务器地址、房间信息和平台开关，保存后即可在支持页面直接发起点歌。</p>
            </div>

            <div class="hero-badges" aria-hidden="true">
                <span class="hero-badge">Bilibili</span>
                <span class="hero-badge hero-badge-accent">NetEase</span>
            </div>
        </header>

        <main class="content">
            <form id="configForm">
                <section class="form-section">
                    <div class="section-heading">
                        <span class="section-kicker">连接配置</span>
                        <h2>服务器与房间</h2>
                    </div>

                    <div class="field-stack">
                        <div class="form-group form-group-wide">
                            <label for="endPoint">服务器地址</label>
                            <input type="text" id="endPoint" placeholder="例如 https://example.com:8080 或 example.com:8080" required>
                            <div class="help-text">不填写协议时会默认补全为 https://</div>
                        </div>

                        <div class="field-grid">
                            <div class="form-group">
                                <label for="houseId">房间号</label>
                                <input type="text" id="houseId" placeholder="输入房间号" required>
                            </div>

                            <div class="form-group">
                                <label for="housePwd">房间密码</label>
                                <input type="password" id="housePwd" placeholder="可留空">
                                <div class="help-text">仅在房间开启鉴权时填写</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <div class="section-heading">
                        <span class="section-kicker">身份信息</span>
                        <h2>请求展示资料</h2>
                    </div>

                    <div class="field-grid">
                        <div class="form-group">
                            <label for="userName">用户名</label>
                            <input type="text" id="userName" placeholder="点歌时展示的昵称">
                            <div class="help-text">可以为空，服务端自行兜底</div>
                        </div>

                        <div class="form-group">
                            <label for="userEmail">邮箱</label>
                            <input type="email" id="userEmail" placeholder="接收方需要时再填写">
                            <div class="help-text">用于点歌请求附带的联系信息</div>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <div class="section-heading">
                        <span class="section-kicker">平台范围</span>
                        <h2>功能开关</h2>
                    </div>

                    <div class="switch-grid">
                        <div class="switch-card">
                            <div class="switch-copy">
                                <span class="switch-title">B 站点歌</span>
                                <span class="switch-description">在视频卡片里注入点歌按钮</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="bilibiliEnabled" checked>
                                <span class="slider"></span>
                            </label>
                        </div>

                        <div class="switch-card">
                            <div class="switch-copy">
                                <span class="switch-title">网易云音乐</span>
                                <span class="switch-description">替换分享入口为点歌操作</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="neteaseMusicEnabled" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </section>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存配置</button>
                    <button type="button" class="btn btn-secondary" id="testBtn">测试连接</button>
                </div>
            </form>
        </main>

        <footer class="footer">
            <div class="footer-note">配置保存在浏览器同步存储中。</div>
            <div class="version">v1.0.0</div>
        </footer>
    </div>
    
    <div id="toast" class="toast">
        <span id="toastMessage"></span>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
